<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Story - InsightFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            min-height: 100vh;
        }
        
        .edit-card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            margin: 60px auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.6s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .form-label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
        }
        
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px 18px;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
            outline: none;
        }
        
        textarea {
            resize: vertical;
            min-height: 250px;
        }
        
        .btn-update {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
        }
        
        .btn-cancel {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .edit-card {
                padding: 30px;
                margin: 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="edit-card">
                    <div class="text-center mb-4">
                        <i class="fas fa-edit" style="font-size: 3rem; color: #f59e0b;"></i>
                        <h1 class="mt-3">Edit Your Story</h1>
                        <p class="text-muted">Polish your words to perfection</p>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-heading"></i> Title
                            </label>
                            <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-paragraph"></i> Content
                            </label>
                            <textarea name="content" class="form-control" rows="8" required>{{ post.content }}</textarea>
                        </div>
                        
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn-update">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                            <a href="/" class="btn-cancel">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
