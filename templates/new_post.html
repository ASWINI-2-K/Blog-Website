<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a Story - InsightFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            min-height: 100vh;
        }
        
        .writing-card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            margin: 60px auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.6s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .form-label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
        }
        
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px 18px;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            outline: none;
        }
        
        textarea {
            resize: vertical;
            min-height: 250px;
        }
        
        .btn-publish {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
        
        .btn-cancel {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
        }
        
        .btn-cancel:hover {
            background: #e2e8f0;
            color: #475569;
        }
        
        .word-count {
            text-align: right;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .writing-card {
                padding: 30px;
                margin: 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="writing-card">
                    <div class="text-center mb-4">
                        <i class="fas fa-feather-alt" style="font-size: 3rem; color: #6366f1;"></i>
                        <h1 class="mt-3">Write Something Beautiful</h1>
                        <p class="text-muted">Every great story starts here</p>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-heading"></i> Title
                            </label>
                            <input type="text" name="title" class="form-control" placeholder="What's your story about?" required autofocus>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-paragraph"></i> Content
                            </label>
                            <textarea name="content" id="content" class="form-control" placeholder="Write your story here... Let your thoughts flow freely" required onkeyup="updateWordCount()"></textarea>
                            <div class="word-count">
                                <i class="fas fa-chart-simple"></i> <span id="wordCount">0</span> words
                            </div>
                        </div>
                        
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn-publish">
                                <i class="fas fa-paper-plane"></i> Publish Story
                            </button>
                            <a href="/" class="btn-cancel">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function updateWordCount() {
            const content = document.getElementById('content').value;
            const words = content.trim().split(/\s+/).filter(word => word.length > 0);
            document.getElementById('wordCount').textContent = words.length;
        }
    </script>
</body>
</html>
