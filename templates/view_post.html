<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - Chronica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #faf9f6;
            font-family: 'Georgia', 'Times New Roman', serif;
        }
        
        .reading-container {
            background: white;
            border-radius: 20px;
            padding: 60px;
            margin: 40px auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }
        
        .post-title {
            font-size: 3rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .post-meta {
            padding-bottom: 30px;
            margin-bottom: 40px;
            border-bottom: 2px solid #f0f0f0;
            color: #888;
        }
        
        .post-content {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #333;
        }
        
        .action-buttons {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .btn-action {
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-action:hover {
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .reading-container {
                padding: 30px;
                margin: 20px;
            }
            .post-title {
                font-size: 2rem;
            }
            .post-content {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="reading-container">
                    <div class="post-meta">
                        <i class="fas fa-calendar-alt"></i> {{ post.date_created.strftime('%B %d, %Y') }} at {{ post.date_created.strftime('%I:%M %p') }}
                    </div>
                    
                    <h1 class="post-title">{{ post.title }}</h1>
                    
                    <div class="post-content">
                        <p>{{ post.content }}</p>
                    </div>
                    
                    <div class="action-buttons">
                        <a href="/edit/{{ post.id }}" class="btn btn-warning btn-action">
                            <i class="fas fa-edit"></i> Edit Story
                        </a>
                        <a href="/delete/{{ post.id }}" class="btn btn-danger btn-action" onclick="return confirm('Delete this story?')">
                            <i class="fas fa-trash-alt"></i> Delete Story
                        </a>
                        <a href="/" class="btn btn-secondary btn-action">
                            <i class="fas fa-home"></i> Back Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
